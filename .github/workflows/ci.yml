# =============================================================================
# Radix — Primary CI Pipeline (Enterprise-Grade)
# =============================================================================
#
# Architecture:
#   Phase 0: Change detection + pipeline configuration (instant)
#   Phase 1: Dependency resolution + Mathlib cache warmup (parallel: lint, security)
#   Phase 2: Library build (parallel: lint, security still running)
#   Phase 3: Fan-out — tests, bench, examples builds (maximum parallelism)
#   Phase 4: Test execution + proof verification (maximum parallelism)
#   Phase 5: Benchmarks (main branch only)
#   Phase 6: Pipeline summary + quality gate enforcement
#
# DAG (critical path highlighted with *):
#
#   *changes* ──┬── *resolve-deps* ── *build-lib* ──┬── *build-tests* ──┬── *test-unit*
#               │                                    │                   ├── *test-property*
#               │                                    │                   └── *test-comprehensive*
#               │                                    ├── build-examples ── test-examples
#               │                                    ├── build-bench ── benchmarks
#               │                                    └── verify-proofs
#               ├── lint (no build needed — instant start)
#               └── security-scan (no build needed — instant start)
#                                                                        └── ci-summary
#
# Cache Strategy (4-layer):
#   L1: ~/.elan (toolchain, keyed by lean-toolchain)
#   L2: .lake/packages (deps, keyed by lake-manifest.json + lakefile.lean)
#   L3: .lake/packages/mathlib/.lake/build (Mathlib oleans, keyed by mathlib rev)
#   L4: .lake/build (Radix build artifacts, keyed by commit SHA)
#
# Runner: arc-runner-set-pw (self-hosted ARC runner)
# =============================================================================

name: "CI"
run-name: "${{ github.actor }} — ${{ github.event_name }} on ${{ github.ref_name }}"

on:
  push:
    branches: [main, develop, "release/*", "hotfix/*"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "!CHANGELOG.md"
      - ".gitignore"
      - "LICENSE"
      - "NOTICE"
      - "LICENSES/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/FUNDING.yml"
  pull_request:
    branches: [main, develop, "release/*"]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      skip_cache:
        description: "Skip all caches (clean build)"
        required: false
        type: boolean
        default: false
      full_test:
        description: "Run full test suite including slow tests"
        required: false
        type: boolean
        default: false
      force_benchmarks:
        description: "Force benchmark execution (normally main-only)"
        required: false
        type: boolean
        default: false

# Workflow-level least privilege
permissions:
  contents: read

# Cancel redundant PR pipelines; never cancel main/release pushes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  LAKE_CACHE_DIR: .lake
  LEAN_TOOLCHAIN_FILE: lean-toolchain

# =============================================================================
# Jobs
# =============================================================================
jobs:

  # ===========================================================================
  # Phase 0: Change Detection & Pipeline Configuration
  # ===========================================================================
  changes:
    name: "Detect Changes"
    runs-on: arc-runner-set-pw
    timeout-minutes: 5
    outputs:
      core: ${{ steps.filter.outputs.core }}
      tests: ${{ steps.filter.outputs.tests }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
      examples: ${{ steps.filter.outputs.examples }}
      docs: ${{ steps.filter.outputs.docs }}
      ci: ${{ steps.filter.outputs.ci }}
      build_system: ${{ steps.filter.outputs.build_system }}
      any_lean: ${{ steps.filter.outputs.any_lean }}
      lean_toolchain: ${{ steps.toolchain.outputs.version }}
      mathlib_rev: ${{ steps.mathlib.outputs.rev }}
      cache_prefix: ${{ steps.cache-key.outputs.prefix }}
      is_main: ${{ steps.branch.outputs.is_main }}
      is_release: ${{ steps.branch.outputs.is_release }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Detect file changes"
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            core:
              - 'Radix/**'
              - 'Radix.lean'
            tests:
              - 'tests/**'
              - 'test_helpers.lean'
            benchmarks:
              - 'benchmarks/**'
            examples:
              - 'examples/**'
            docs:
              - 'docs/**'
              - '*.md'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'
            build_system:
              - 'lakefile.lean'
              - 'lean-toolchain'
              - 'lake-manifest.json'
            any_lean:
              - '**/*.lean'

      - name: "Read Lean toolchain version"
        id: toolchain
        run: echo "version=$(cat lean-toolchain | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: "Read Mathlib revision"
        id: mathlib
        run: |
          REV=$(grep -oP '"rev":\s*"\K[^"]+' lake-manifest.json | head -1)
          echo "rev=${REV}" >> "$GITHUB_OUTPUT"

      - name: "Generate cache key prefix"
        id: cache-key
        run: |
          TOOLCHAIN_HASH=$(sha256sum lean-toolchain | cut -c1-16)
          MANIFEST_HASH=$(sha256sum lake-manifest.json | cut -c1-16)
          LAKEFILE_HASH=$(sha256sum lakefile.lean | cut -c1-16)
          echo "prefix=lean-${TOOLCHAIN_HASH}-${MANIFEST_HASH}-${LAKEFILE_HASH}" >> "$GITHUB_OUTPUT"

      - name: "Detect branch type"
        id: branch
        run: |
          IS_MAIN="false"
          IS_RELEASE="false"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            IS_MAIN="true"
          fi
          if [[ "${{ github.ref }}" =~ ^refs/heads/release/ ]]; then
            IS_RELEASE="true"
          fi
          echo "is_main=${IS_MAIN}" >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: "Pipeline metadata"
        id: meta
        run: echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: "Pipeline configuration summary"
        run: |
          echo "### Pipeline Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Toolchain | \`${{ steps.toolchain.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mathlib rev | \`${{ steps.mathlib.outputs.rev }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache prefix | \`${{ steps.cache-key.outputs.prefix }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Core changed | ${{ steps.filter.outputs.core }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests changed | ${{ steps.filter.outputs.tests }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build system changed | ${{ steps.filter.outputs.build_system }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Event | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Phase 1: Dependency Resolution & Mathlib Cache Warmup
  # ===========================================================================
  resolve-deps:
    name: "Resolve Dependencies"
    runs-on: arc-runner-set-pw
    needs: [changes]
    timeout-minutes: 120
    outputs:
      lake_cache_key: ${{ steps.cache-info.outputs.lake_key }}
      mathlib_cache_restored: ${{ steps.mathlib-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Install elan & Lean"
        run: |
          if ! command -v elan &> /dev/null; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          TOOLCHAIN=$(cat lean-toolchain | tr -d '[:space:]')
          elan toolchain install "$TOOLCHAIN" || elan toolchain list | grep -q "$TOOLCHAIN"
          elan default "$TOOLCHAIN"
          lean --version
          lake --version

      # L1+L2: Elan + Lake packages
      - name: "Restore .lake directory cache"
        id: lake-cache
        if: inputs.skip_cache != true
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .lake/packages
            .lake/build
            ~/.elan
          key: ${{ needs.changes.outputs.cache_prefix }}-lake-${{ hashFiles('lake-manifest.json', 'lakefile.lean') }}
          restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-lake-

      # L3: Mathlib oleans (biggest cache layer ~2-4GB)
      - name: "Restore Mathlib oleans cache"
        id: mathlib-cache
        if: inputs.skip_cache != true
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .lake/packages/mathlib/.lake/build
          key: mathlib-oleans-${{ needs.changes.outputs.mathlib_rev }}-${{ needs.changes.outputs.lean_toolchain }}
          restore-keys: |
            mathlib-oleans-${{ needs.changes.outputs.mathlib_rev }}-

      - name: "Lake update (fetch dependencies)"
        run: |
          if [ -d .lake/packages/mathlib ] && [ "${{ steps.lake-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Lake packages cache hit — skipping lake update"
          else
            lake update
          fi

      - name: "Fetch Mathlib oleans"
        if: steps.mathlib-cache.outputs.cache-hit != 'true'
        run: lake exe cache get || echo "::warning::Mathlib cache get failed — will build from source"

      - name: "Verify dependency integrity"
        run: |
          python3 << 'PYEOF'
          import json, sys
          with open('lake-manifest.json') as f:
              manifest = json.load(f)
          errors = 0
          for pkg in manifest.get('packages', []):
              name = pkg.get('name', 'unknown')
              rev = pkg.get('rev', '')
              url = pkg.get('url', '')
              if pkg.get('type') == 'git':
                  if len(rev) != 40:
                      print(f"::error::Package '{name}' has non-pinned rev: {rev}")
                      errors += 1
                  if not url.startswith('https://'):
                      print(f"::error::Package '{name}' uses insecure URL: {url}")
                      errors += 1
          if errors > 0:
              sys.exit(1)
          print(f"All {len(manifest.get('packages', []))} dependencies verified")
          PYEOF

      - name: "Generate cache info"
        id: cache-info
        run: |
          echo "lake_key=${{ needs.changes.outputs.cache_prefix }}-lake-${{ hashFiles('lake-manifest.json', 'lakefile.lean') }}" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Phase 2: Build Library (critical path)
  # ===========================================================================
  build-lib:
    name: "Build Library"
    runs-on: arc-runner-set-pw
    needs: [changes, resolve-deps]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-lake-${{ hashFiles('lake-manifest.json', 'lakefile.lean') }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-lake-
          skip-cache: ${{ inputs.skip_cache && 'true' || 'false' }}

      - name: "Build: Radix library"
        run: time lake build Radix 2>&1 | tail -30

      # Save build artifacts for all downstream jobs
      - name: "Save Radix build cache"
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        if: always()
        with:
          path: |
            .lake/packages
            .lake/build
            ~/.elan
          key: ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}

  # ===========================================================================
  # Phase 3: Fan-out Builds (maximum parallelism)
  # ===========================================================================
  build-tests:
    name: "Build Tests"
    runs-on: arc-runner-set-pw
    needs: [changes, build-lib]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-lake-

      - name: "Build: Unit tests"
        run: time lake build test 2>&1 | tail -10

      - name: "Build: Property tests"
        run: time lake build proptest 2>&1 | tail -10

      - name: "Build: Comprehensive tests"
        run: time lake build comptest 2>&1 | tail -10

      - name: "Save test build cache"
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        if: always()
        with:
          path: |
            .lake/packages
            .lake/build
            ~/.elan
          key: ${{ needs.changes.outputs.cache_prefix }}-test-build-${{ github.sha }}

  build-bench:
    name: "Build Benchmarks"
    runs-on: arc-runner-set-pw
    needs: [changes, build-lib]
    if: >-
      !cancelled() && needs.build-lib.result == 'success' &&
      (
        needs.changes.outputs.benchmarks == 'true' ||
        needs.changes.outputs.core == 'true' ||
        github.event_name == 'workflow_dispatch'
      ) && (
        needs.changes.outputs.is_main == 'true' ||
        inputs.force_benchmarks
      )
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-lake-

      - name: "Build: Lean benchmarks"
        run: time lake build bench 2>&1 | tail -10

      - name: "Build: C baseline benchmarks"
        run: |
          if [ -f benchmarks/baseline.c ]; then
            gcc -O2 -march=native -fno-builtin -o benchmarks/baseline benchmarks/baseline.c
            echo "C baseline compiled with: $(gcc --version | head -1)"
          fi

      - name: "Save benchmark build cache"
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        if: always()
        with:
          path: |
            .lake/packages
            .lake/build
            ~/.elan
          key: ${{ needs.changes.outputs.cache_prefix }}-bench-build-${{ github.sha }}

  build-examples:
    name: "Build Examples"
    runs-on: arc-runner-set-pw
    needs: [changes, build-lib]
    if: >-
      !cancelled() && needs.build-lib.result == 'success' &&
      (
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.examples == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-lake-

      - name: "Build: Examples"
        run: time lake build examples 2>&1 | tail -10

  # ===========================================================================
  # Phase 2 (parallel): Lint — No build dependency (instant start)
  # ===========================================================================
  lint:
    name: "Lint & Validate"
    runs-on: arc-runner-set-pw
    needs: [changes]
    if: >-
      needs.changes.outputs.any_lean == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.build_system == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Validate YAML syntax"
        run: |
          ERRORS=0
          find .github -name '*.yml' -o -name '*.yaml' | while read f; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1; then
              echo "::error file=$f::Invalid YAML syntax"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ -f .gitlab-ci.yml ]; then
            python3 -c "import yaml; yaml.safe_load(open('.gitlab-ci.yml'))" || {
              echo "::error file=.gitlab-ci.yml::Invalid YAML syntax"
            }
          fi

      - name: "Validate lake-manifest.json"
        run: python3 -c "import json; json.load(open('lake-manifest.json'))" && echo "OK"

      - name: "Validate lakefile.lean"
        run: 'test -s lakefile.lean && echo "OK: lakefile.lean is non-empty"'

      - name: "Validate lean-toolchain"
        run: |
          TOOLCHAIN=$(cat lean-toolchain | tr -d '[:space:]')
          if [[ ! "$TOOLCHAIN" =~ ^leanprover/lean4: ]]; then
            echo "::error::Unexpected toolchain format: $TOOLCHAIN"
            exit 1
          fi
          echo "Toolchain: $TOOLCHAIN"

      - name: "Check trailing whitespace"
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if grep -Pn '\s+$' "$file" > /dev/null 2>&1; then
              echo "::warning file=$file::Trailing whitespace detected"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name '*.lean' -not -path './.lake/*')
          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::Trailing whitespace in $ERRORS file(s)"
          fi

      - name: "Check for TODO/FIXME markers"
        run: |
          find . -name '*.lean' -not -path './.lake/*' -exec grep -Hn 'TODO\|FIXME\|HACK\|XXX' {} \; | head -50 | while read line; do
            FILE=$(echo "$line" | cut -d: -f1)
            LINE_NUM=$(echo "$line" | cut -d: -f2)
            echo "::notice file=$FILE,line=$LINE_NUM::Found TODO/FIXME marker"
          done
        continue-on-error: true

      - name: "Check required project files"
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md LICENSE; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "::error::Required file missing: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            exit 1
          fi

  # ===========================================================================
  # Phase 2 (parallel): Security Scan — No build dependency (instant start)
  # ===========================================================================
  security-scan:
    name: "Security Scan"
    runs-on: arc-runner-set-pw
    needs: [changes]
    if: >-
      needs.changes.outputs.core == 'true' ||
      needs.changes.outputs.build_system == 'true' ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: "Secret detection"
        run: |
          echo "=== Secret Detection ==="
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --verbose --no-git 2>&1 | tee gitleaks-report.json || {
              echo "::error::Secrets detected in codebase!"
              exit 1
            }
          else
            # Manual fallback — check for common secret patterns
            FOUND=0
            for pattern in \
              'AKIA[0-9A-Z]{16}' \
              'ghp_[a-zA-Z0-9]{36}' \
              'gho_[a-zA-Z0-9]{36}' \
              'glpat-[a-zA-Z0-9_-]{20}' \
              'sk-[a-zA-Z0-9]{48}' \
              '-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'; do
              if grep -rPn "$pattern" --include='*.lean' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.toml' . 2>/dev/null | grep -v '.lake/'; then
                echo "::error::Potential secret detected matching pattern: $pattern"
                FOUND=$((FOUND + 1))
              fi
            done
            if [ "$FOUND" -gt 0 ]; then
              exit 1
            fi
            echo "No secrets detected"
          fi

      - name: "Dependency integrity audit"
        run: |
          python3 << 'PYEOF'
          import json, sys

          with open('lake-manifest.json') as f:
              manifest = json.load(f)

          errors = 0
          warnings = 0
          trusted_orgs = {'leanprover', 'leanprover-community'}

          for pkg in manifest.get('packages', []):
              name = pkg.get('name', 'unknown')
              rev = pkg.get('rev', '')
              url = pkg.get('url', '')

              if pkg.get('type') == 'git':
                  if len(rev) != 40:
                      print(f"::error::Package '{name}' has non-pinned rev: {rev}")
                      errors += 1
                  if not url.startswith('https://'):
                      print(f"::error::Package '{name}' uses insecure URL: {url}")
                      errors += 1
                  org = url.split('github.com/')[-1].split('/')[0] if 'github.com/' in url else ''
                  if org and org not in trusted_orgs:
                      print(f"::warning::Package '{name}' from untrusted org: {org}")
                      warnings += 1

          print(f"Audited {len(manifest.get('packages', []))} packages: {errors} errors, {warnings} warnings")
          if errors > 0:
              sys.exit(1)
          PYEOF

      - name: "License compliance"
        run: |
          test -f LICENSE || { echo "::error::LICENSE file missing!"; exit 1; }
          test -d LICENSES || echo "::notice::No LICENSES/ directory (REUSE)"
          echo "License check passed"

      - name: "Upload security reports"
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-reports-${{ needs.changes.outputs.short_sha }}
          path: gitleaks-report.json
          retention-days: 90
          if-no-files-found: ignore

  # ===========================================================================
  # Phase 4: Test Execution (maximum parallelism — 3 test suites in parallel)
  # ===========================================================================
  test-unit:
    name: "Unit Tests"
    runs-on: arc-runner-set-pw
    needs: [changes, build-tests]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-test-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}

      - name: "Run unit tests"
        run: |
          START=$(date +%s)
          lake exe test 2>&1 | tee test-unit-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          DURATION=$(($(date +%s) - START))
          echo "Duration: ${DURATION}s"
          echo "unit_exit=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: "Upload results"
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-unit-${{ needs.changes.outputs.short_sha }}
          path: test-unit-output.txt
          retention-days: 30

      - name: "Assert pass"
        run: exit ${unit_exit:-1}

  test-property:
    name: "Property Tests"
    runs-on: arc-runner-set-pw
    needs: [changes, build-tests]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-test-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}

      - name: "Run property-based tests"
        run: |
          START=$(date +%s)
          lake exe proptest 2>&1 | tee test-property-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          DURATION=$(($(date +%s) - START))
          echo "Duration: ${DURATION}s"
          echo "prop_exit=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: "Upload results"
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-property-${{ needs.changes.outputs.short_sha }}
          path: test-property-output.txt
          retention-days: 30

      - name: "Assert pass"
        run: exit ${prop_exit:-1}

  test-comprehensive:
    name: "Comprehensive Tests"
    runs-on: arc-runner-set-pw
    needs: [changes, build-tests]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-test-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}

      - name: "Run comprehensive tests"
        run: |
          START=$(date +%s)
          lake exe comptest 2>&1 | tee test-comprehensive-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          DURATION=$(($(date +%s) - START))
          echo "Duration: ${DURATION}s"
          echo "comp_exit=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: "Upload results"
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-comprehensive-${{ needs.changes.outputs.short_sha }}
          path: test-comprehensive-output.txt
          retention-days: 30

      - name: "Assert pass"
        run: exit ${comp_exit:-1}

  test-examples:
    name: "Examples"
    runs-on: arc-runner-set-pw
    needs: [changes, build-examples]
    if: >-
      !cancelled() && needs.build-examples.result == 'success'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-lake-

      - name: "Run examples"
        run: lake exe examples

  # ===========================================================================
  # Phase 4 (parallel): Proof Verification — Trust Boundary Enforcement
  # ===========================================================================
  verify-proofs:
    name: "Verify Proofs"
    runs-on: arc-runner-set-pw
    needs: [changes, build-lib]
    if: >-
      !cancelled() && needs.build-lib.result == 'success' &&
      (
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.build_system == 'true'
      )
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-lake-

      - name: "Verify all proofs type-check"
        run: |
          echo "=== Proof Verification ==="
          time lake build Radix 2>&1 | tail -20
          echo "=== All proofs verified ==="

      - name: "Theorem/lemma census"
        run: |
          THEOREMS=$(grep -rn '^theorem\|^  theorem' Radix/ | wc -l)
          LEMMAS=$(grep -rn '^lemma\|^  lemma' Radix/ | wc -l)
          INSTANCES=$(grep -rn '^instance\|^  instance' Radix/ | wc -l)
          DEFS=$(grep -rn '^def\|^  def\|^private def' Radix/ | wc -l)
          AXIOMS=$(grep -rn '^axiom\|^  axiom' Radix/ | wc -l)

          echo "### Proof Census" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Theorems | $THEOREMS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lemmas | $LEMMAS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instances | $INSTANCES |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Definitions | $DEFS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Axioms | $AXIOMS |" >> "$GITHUB_STEP_SUMMARY"

      - name: "Zero-sorry audit"
        run: |
          SORRY_COUNT=$(grep -rn '\bsorry\b' Radix/ | grep -v '\.lake/' | wc -l)
          if [ "$SORRY_COUNT" -gt 0 ]; then
            echo "::error::Found $SORRY_COUNT 'sorry' in codebase"
            grep -rn '\bsorry\b' Radix/ | grep -v '\.lake/'
            exit 1
          fi
          echo "Zero sorry — all proofs complete"

      - name: "Trust assumptions audit"
        run: |
          echo "=== Trust Assumptions ==="
          TRUST_ITEMS=$(grep -rn 'trust_\|@\[implemented_by\]\|native_decide' Radix/ | grep -v '\.lake/' | wc -l)
          echo "Trust assumptions: $TRUST_ITEMS"
          grep -rn 'trust_\|@\[implemented_by\]\|native_decide' Radix/ | grep -v '\.lake/' || true

          echo "### Trust Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sorry: 0" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trust assumptions: $TRUST_ITEMS" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Phase 5: Benchmarks (main branch + manual dispatch only)
  # ===========================================================================
  benchmarks:
    name: "Benchmarks"
    runs-on: arc-runner-set-pw
    needs: [changes, build-bench]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          cache-key: ${{ needs.changes.outputs.cache_prefix }}-bench-build-${{ github.sha }}
          cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-radix-build-${{ github.sha }}

      - name: "System info"
        run: |
          echo "=== CPU ==="
          lscpu | grep -E 'Model name|CPU\(s\)|Thread|MHz|cache' || cat /proc/cpuinfo | head -20
          echo "=== Memory ==="
          free -h
          echo "=== Kernel ==="
          uname -a

      - name: "Run Lean benchmarks (3 runs for stability)"
        run: |
          for i in 1 2 3; do
            echo "=== Run $i/3 ==="
            lake exe bench 2>&1 | tee "bench-lean-run-${i}.txt"
          done

      - name: "Run C baseline (3 runs)"
        run: |
          if [ -f benchmarks/baseline.c ]; then
            gcc -O2 -march=native -fno-builtin -o benchmarks/baseline benchmarks/baseline.c
            for i in 1 2 3; do
              echo "=== C Baseline Run $i/3 ==="
              ./benchmarks/baseline 2>&1 | tee "bench-c-run-${i}.txt"
            done
          fi

      - name: "Benchmark summary"
        run: |
          echo "### Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Lean" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat bench-lean-run-1.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f bench-c-run-1.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### C Baseline" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat bench-c-run-1.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: "Upload benchmark results"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-${{ needs.changes.outputs.short_sha }}
          path: bench-*.txt
          retention-days: 180

  # ===========================================================================
  # Phase 6: Pipeline Summary & Quality Gate Enforcement
  # ===========================================================================
  ci-summary:
    name: "CI Summary"
    runs-on: arc-runner-set-pw
    needs:
      - changes
      - resolve-deps
      - build-lib
      - build-tests
      - build-bench
      - build-examples
      - lint
      - security-scan
      - test-unit
      - test-property
      - test-comprehensive
      - test-examples
      - verify-proofs
      - benchmarks
    if: always()
    timeout-minutes: 5
    steps:
      - name: "Pipeline result matrix"
        run: |
          echo "### CI Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Prepare | Resolve Dependencies | \`${{ needs.resolve-deps.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | Library | \`${{ needs.build-lib.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | Tests | \`${{ needs.build-tests.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | Benchmarks | \`${{ needs.build-bench.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | Examples | \`${{ needs.build-examples.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate | Lint | \`${{ needs.lint.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security | Scan | \`${{ needs.security-scan.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Unit | \`${{ needs.test-unit.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Property | \`${{ needs.test-property.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Comprehensive | \`${{ needs.test-comprehensive.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Examples | \`${{ needs.test-examples.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify | Proofs | \`${{ needs.verify-proofs.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Perf | Benchmarks | \`${{ needs.benchmarks.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\` | **Actor:** ${{ github.actor }} | **Event:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"

      - name: "Enforce quality gates"
        run: |
          FAILED=0
          CRITICAL_JOBS=(
            "${{ needs.build-lib.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.security-scan.result }}"
            "${{ needs.test-unit.result }}"
            "${{ needs.test-property.result }}"
            "${{ needs.test-comprehensive.result }}"
            "${{ needs.verify-proofs.result }}"
          )
          JOB_NAMES=(
            "Build Library"
            "Lint & Validate"
            "Security Scan"
            "Unit Tests"
            "Property Tests"
            "Comprehensive Tests"
            "Proof Verification"
          )
          for i in "${!CRITICAL_JOBS[@]}"; do
            RESULT="${CRITICAL_JOBS[$i]}"
            NAME="${JOB_NAMES[$i]}"
            if [ "$RESULT" = "failure" ]; then
              echo "::error::QUALITY GATE FAILED: ${NAME}"
              FAILED=$((FAILED + 1))
            elif [ "$RESULT" = "cancelled" ]; then
              echo "::warning::Job cancelled: ${NAME}"
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} critical quality gate(s) failed — merge blocked"
            exit 1
          fi
          echo "All quality gates passed"
