# =============================================================================
# Radix — Primary CI Pipeline (Enterprise-Grade)
# =============================================================================
#
# Architecture:
#   Phase 0: Change detection + pipeline configuration (instant)
#   Phase 1: Dependency validation (parallel: lint, security)
#   Phase 2: Build, test, and proof verification in one workspace
#   Phase 3: Benchmarks (main branch only, parallel when enabled)
#   Phase 4: Pipeline summary + quality gate enforcement
#
# DAG (critical path highlighted with *):
#
#   *changes* ──┬── *resolve-deps* ── *build-lib*
#               ├── lint (no build needed — instant start)
#               ├── security-scan (no build needed — instant start)
#               └── benchmarks (main/manual only)
#
#   (*build-lib*, lint, security-scan, benchmarks) ──> ci-summary
#
# Cache Strategy (3-layer):
#   L1: ~/.elan (toolchain, keyed by lean-toolchain)
#   L2: .lake/packages without Mathlib oleans (deps, keyed by lake-manifest.json + lakefile.lean)
#   L3: .lake/packages/mathlib/.lake/build (Mathlib oleans, keyed by mathlib rev)
#
#   Deliberately not caching .lake/build across jobs: cross-job transfer is slower
#   than rebuilding inside a single workspace on ephemeral ARC runners.
#
# Runner: arc-runner-set-pw (self-hosted ARC runner)
# =============================================================================

name: "CI"
run-name: "${{ github.actor }} — ${{ github.event_name }} on ${{ github.ref_name }}"

on:
  push:
    branches: [main, "release/*"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "!CHANGELOG.md"
      - ".gitignore"
      - "LICENSE"
      - "NOTICE"
      - "LICENSES/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/FUNDING.yml"
  pull_request:
    branches: [main, "release/*"]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      skip_cache:
        description: "Skip all caches (clean build)"
        required: false
        type: boolean
        default: false
      full_test:
        description: "Run full test suite including slow tests"
        required: false
        type: boolean
        default: false
      force_benchmarks:
        description: "Force benchmark execution (normally main-only)"
        required: false
        type: boolean
        default: false

# Workflow-level least privilege
permissions:
  contents: read

# Cancel redundant PR pipelines; never cancel main/release pushes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  LAKE_CACHE_DIR: .lake
  LEAN_TOOLCHAIN_FILE: lean-toolchain

# =============================================================================
# Jobs
# =============================================================================
jobs:

  # ===========================================================================
  # Phase 0: Change Detection & Pipeline Configuration
  # ===========================================================================
  changes:
    name: "Detect Changes"
    runs-on: arc-runner-set-pw
    timeout-minutes: 5
    outputs:
      core: ${{ steps.filter.outputs.core }}
      tests: ${{ steps.filter.outputs.tests }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
      examples: ${{ steps.filter.outputs.examples }}
      docs: ${{ steps.filter.outputs.docs }}
      ci: ${{ steps.filter.outputs.ci }}
      build_system: ${{ steps.filter.outputs.build_system }}
      any_lean: ${{ steps.filter.outputs.any_lean }}
      lean_toolchain: ${{ steps.toolchain.outputs.version }}
      mathlib_rev: ${{ steps.mathlib.outputs.rev }}
      cache_prefix: ${{ steps.cache-key.outputs.prefix }}
      is_main: ${{ steps.branch.outputs.is_main }}
      is_release: ${{ steps.branch.outputs.is_release }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Detect file changes"
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            core:
              - 'Radix/**'
              - 'Radix.lean'
            tests:
              - 'tests/**'
              - 'test_helpers.lean'
            benchmarks:
              - 'benchmarks/**'
            examples:
              - 'examples/**'
            docs:
              - 'docs/**'
              - '*.md'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'
            build_system:
              - 'lakefile.lean'
              - 'lean-toolchain'
              - 'lake-manifest.json'
            any_lean:
              - '**/*.lean'

      - name: "Read Lean toolchain version"
        id: toolchain
        run: echo "version=$(cat lean-toolchain | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: "Read Mathlib revision"
        id: mathlib
        run: |
          REV=$(grep -oP '"rev":\s*"\K[^"]+' lake-manifest.json | head -1)
          echo "rev=${REV}" >> "$GITHUB_OUTPUT"

      - name: "Generate cache key prefix"
        id: cache-key
        run: |
          TOOLCHAIN_HASH=$(sha256sum lean-toolchain | cut -c1-16)
          MANIFEST_HASH=$(sha256sum lake-manifest.json | cut -c1-16)
          LAKEFILE_HASH=$(sha256sum lakefile.lean | cut -c1-16)
          echo "prefix=lean-${TOOLCHAIN_HASH}-${MANIFEST_HASH}-${LAKEFILE_HASH}" >> "$GITHUB_OUTPUT"

      - name: "Detect branch type"
        id: branch
        run: |
          IS_MAIN="false"
          IS_RELEASE="false"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            IS_MAIN="true"
          fi
          if [[ "${{ github.ref }}" =~ ^refs/heads/release/ ]]; then
            IS_RELEASE="true"
          fi
          echo "is_main=${IS_MAIN}" >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: "Pipeline metadata"
        id: meta
        run: echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: "Pipeline configuration summary"
        run: |
          echo "### Pipeline Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Toolchain | \`${{ steps.toolchain.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mathlib rev | \`${{ steps.mathlib.outputs.rev }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache prefix | \`${{ steps.cache-key.outputs.prefix }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Core changed | ${{ steps.filter.outputs.core }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests changed | ${{ steps.filter.outputs.tests }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build system changed | ${{ steps.filter.outputs.build_system }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Event | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Phase 1: Dependency Validation
  # ===========================================================================
  resolve-deps:
    name: "Validate Dependencies"
    runs-on: arc-runner-set-pw
    needs: [changes]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Verify dependency integrity"
        run: |
          python3 << 'PYEOF'
          import json, sys
          with open('lake-manifest.json') as f:
              manifest = json.load(f)
          errors = 0
          for pkg in manifest.get('packages', []):
              name = pkg.get('name', 'unknown')
              rev = pkg.get('rev', '')
              url = pkg.get('url', '')
              if pkg.get('type') == 'git':
                  if len(rev) != 40:
                      print(f"::error::Package '{name}' has non-pinned rev: {rev}")
                      errors += 1
                  if not url.startswith('https://'):
                      print(f"::error::Package '{name}' uses insecure URL: {url}")
                      errors += 1
          if errors > 0:
              sys.exit(1)
          print(f"All {len(manifest.get('packages', []))} dependencies verified")
          PYEOF

  # ===========================================================================
  # Phase 2: Build, Test & Verify (single workspace, no cross-job build cache)
  # ===========================================================================
  build-lib:
    name: "Build, Test & Verify"
    runs-on: arc-runner-set-pw
    needs: [changes, resolve-deps]
    if: >-
      needs.changes.outputs.any_lean == 'true' ||
      needs.changes.outputs.build_system == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        id: setup-lean
        uses: ./.github/actions/lean-setup
        with:
          dependency-cache-key: ${{ needs.changes.outputs.cache_prefix }}-deps-${{ hashFiles('lake-manifest.json', 'lakefile.lean') }}
          dependency-cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-deps-
          mathlib-cache-key: mathlib-oleans-${{ needs.changes.outputs.mathlib_rev }}-${{ needs.changes.outputs.lean_toolchain }}
          mathlib-cache-restore-keys: |
            mathlib-oleans-${{ needs.changes.outputs.mathlib_rev }}-
          mathlib-cache: "true"
          skip-cache: ${{ inputs.skip_cache && 'true' || 'false' }}

      - name: "Initialize result flags"
        run: |
          echo "build_exit=1" >> "$GITHUB_ENV"
          echo "unit_exit=0" >> "$GITHUB_ENV"
          echo "prop_exit=0" >> "$GITHUB_ENV"
          echo "comp_exit=0" >> "$GITHUB_ENV"
          echo "examples_exit=0" >> "$GITHUB_ENV"
          echo "sorry_exit=0" >> "$GITHUB_ENV"

      - name: "Build: Radix library"
        continue-on-error: true
        run: |
          START=$(date +%s)
          lake build Radix 2>&1 | tee build-lib-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          DURATION=$(($(date +%s) - START))
          echo "Duration: ${DURATION}s"
          echo "build_exit=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: "Run unit tests"
        if: env.build_exit == '0'
        continue-on-error: true
        run: |
          START=$(date +%s)
          lake exe test 2>&1 | tee test-unit-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          DURATION=$(($(date +%s) - START))
          echo "Duration: ${DURATION}s"
          echo "unit_exit=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: "Run property-based tests"
        if: env.build_exit == '0'
        continue-on-error: true
        run: |
          START=$(date +%s)
          lake exe proptest 2>&1 | tee test-property-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          DURATION=$(($(date +%s) - START))
          echo "Duration: ${DURATION}s"
          echo "prop_exit=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: "Run comprehensive tests"
        if: env.build_exit == '0'
        continue-on-error: true
        run: |
          START=$(date +%s)
          lake exe comptest 2>&1 | tee test-comprehensive-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          DURATION=$(($(date +%s) - START))
          echo "Duration: ${DURATION}s"
          echo "comp_exit=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: "Run examples"
        if: >-
          env.build_exit == '0' &&
          (
            needs.changes.outputs.core == 'true' ||
            needs.changes.outputs.examples == 'true' ||
            needs.changes.outputs.build_system == 'true' ||
            needs.changes.outputs.ci == 'true' ||
            github.event_name == 'workflow_dispatch'
          )
        continue-on-error: true
        run: |
          START=$(date +%s)
          lake exe examples 2>&1 | tee test-examples-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          DURATION=$(($(date +%s) - START))
          echo "Duration: ${DURATION}s"
          echo "examples_exit=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: "Theorem/lemma census"
        if: env.build_exit == '0'
        run: |
          THEOREMS=$(grep -rn '^theorem\|^  theorem' Radix/ | wc -l)
          LEMMAS=$(grep -rn '^lemma\|^  lemma' Radix/ | wc -l)
          INSTANCES=$(grep -rn '^instance\|^  instance' Radix/ | wc -l)
          DEFS=$(grep -rn '^def\|^  def\|^private def' Radix/ | wc -l)
          AXIOMS=$(grep -rn '^axiom\|^  axiom' Radix/ | wc -l)

          echo "### Proof Census" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Theorems | $THEOREMS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lemmas | $LEMMAS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instances | $INSTANCES |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Definitions | $DEFS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Axioms | $AXIOMS |" >> "$GITHUB_STEP_SUMMARY"

      - name: "Zero-sorry audit"
        if: env.build_exit == '0'
        continue-on-error: true
        run: |
          SORRY_COUNT=$(grep -rn '\bsorry\b' Radix/ | grep -v '\.lake/' | wc -l)
          if [ "$SORRY_COUNT" -gt 0 ]; then
            echo "::error::Found $SORRY_COUNT 'sorry' in codebase"
            grep -rn '\bsorry\b' Radix/ | grep -v '\.lake/'
            echo "sorry_exit=1" >> "$GITHUB_ENV"
            exit 1
          fi
          echo "Zero sorry — all proofs complete"
          echo "sorry_exit=0" >> "$GITHUB_ENV"

      - name: "Trust assumptions audit"
        if: env.build_exit == '0'
        run: |
          echo "=== Trust Assumptions ==="
          TRUST_ITEMS=$(grep -rn 'trust_\|@\[implemented_by\]' Radix/ | grep -v '\.lake/' | wc -l)
          echo "Trust assumptions: $TRUST_ITEMS"
          grep -rn 'trust_\|@\[implemented_by\]' Radix/ | grep -v '\.lake/' || true

          echo "### Trust Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sorry: 0" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trust assumptions: $TRUST_ITEMS" >> "$GITHUB_STEP_SUMMARY"

      - name: "Save dependency cache"
        if: >-
          always() &&
          inputs.skip_cache != true &&
          steps.setup-lean.outputs.dependency-cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .lake/packages
            !.lake/packages/mathlib/.lake/build
          key: ${{ needs.changes.outputs.cache_prefix }}-deps-${{ hashFiles('lake-manifest.json', 'lakefile.lean') }}

      - name: "Save Mathlib oleans cache"
        if: >-
          always() &&
          inputs.skip_cache != true &&
          steps.setup-lean.outputs.mathlib-cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .lake/packages/mathlib/.lake/build
          key: mathlib-oleans-${{ needs.changes.outputs.mathlib_rev }}-${{ needs.changes.outputs.lean_toolchain }}

      - name: "Upload test results"
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-results-${{ needs.changes.outputs.short_sha }}
          path: |
            build-lib-output.txt
            test-unit-output.txt
            test-property-output.txt
            test-comprehensive-output.txt
            test-examples-output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: "Assert pass"
        run: |
          FAILED=0
          for pair in \
            "Build Library:${build_exit:-1}" \
            "Unit Tests:${unit_exit:-0}" \
            "Property Tests:${prop_exit:-0}" \
            "Comprehensive Tests:${comp_exit:-0}" \
            "Examples:${examples_exit:-0}" \
            "Zero Sorry:${sorry_exit:-0}"; do
            NAME=${pair%%:*}
            CODE=${pair##*:}
            if [ "$CODE" -ne 0 ]; then
              echo "::error::${NAME} failed with exit code ${CODE}"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} verification step(s) failed"
            exit 1
          fi

  # ===========================================================================
  # Phase 2 (parallel): Lint — No build dependency (instant start)
  # ===========================================================================
  lint:
    name: "Lint & Validate"
    runs-on: arc-runner-set-pw
    needs: [changes]
    if: >-
      needs.changes.outputs.any_lean == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.build_system == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Validate YAML syntax"
        run: |
          mapfile -t YAML_FILES < <(find .github -name '*.yml' -o -name '*.yaml' | sort)
          if [ -f .pre-commit-config.yaml ]; then
            YAML_FILES+=(.pre-commit-config.yaml)
          fi
          if [ -f .gitlab-ci.yml ]; then
            YAML_FILES+=(.gitlab-ci.yml)
          fi
          python3 scripts/validate_yaml.py "${YAML_FILES[@]}"

      - name: "Validate lake-manifest.json"
        run: python3 -c "import json; json.load(open('lake-manifest.json'))" && echo "OK"

      - name: "Validate lakefile.lean"
        run: 'test -s lakefile.lean && echo "OK: lakefile.lean is non-empty"'

      - name: "Validate lean-toolchain"
        run: |
          TOOLCHAIN=$(cat lean-toolchain | tr -d '[:space:]')
          if [[ ! "$TOOLCHAIN" =~ ^leanprover/lean4: ]]; then
            echo "::error::Unexpected toolchain format: $TOOLCHAIN"
            exit 1
          fi
          echo "Toolchain: $TOOLCHAIN"

      - name: "Check trailing whitespace"
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if grep -Pn '\s+$' "$file" > /dev/null 2>&1; then
              echo "::warning file=$file::Trailing whitespace detected"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name '*.lean' -not -path './.lake/*')
          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::Trailing whitespace in $ERRORS file(s)"
          fi

      - name: "Check for TODO/FIXME markers"
        run: |
          find . -name '*.lean' -not -path './.lake/*' -exec grep -Hn 'TODO\|FIXME\|HACK\|XXX' {} \; | head -50 | while read line; do
            FILE=$(echo "$line" | cut -d: -f1)
            LINE_NUM=$(echo "$line" | cut -d: -f2)
            echo "::notice file=$FILE,line=$LINE_NUM::Found TODO/FIXME marker"
          done
        continue-on-error: true

      - name: "Check required project files"
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md LICENSE; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "::error::Required file missing: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            exit 1
          fi

      - name: "Validate generated project stats"
        run: python3 scripts/update_project_stats.py --check

  # ===========================================================================
  # Phase 2 (parallel): Security Scan — No build dependency (instant start)
  # ===========================================================================
  security-scan:
    name: "Security Scan"
    runs-on: arc-runner-set-pw
    needs: [changes]
    if: >-
      needs.changes.outputs.core == 'true' ||
      needs.changes.outputs.build_system == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: "Secret detection"
        run: |
          echo "=== Secret Detection ==="
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --verbose --no-git 2>&1 | tee gitleaks-report.json || {
              echo "::error::Secrets detected in codebase!"
              exit 1
            }
          else
            # Manual fallback — check for common secret patterns
            FOUND=0
            for pattern in \
              'AKIA[0-9A-Z]{16}' \
              'ghp_[a-zA-Z0-9]{36}' \
              'gho_[a-zA-Z0-9]{36}' \
              'glpat-[a-zA-Z0-9_-]{20}' \
              'sk-[a-zA-Z0-9]{48}' \
              '-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'; do
              if grep -rPn "$pattern" --include='*.lean' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.toml' . 2>/dev/null | grep -v '.lake/'; then
                echo "::error::Potential secret detected matching pattern: $pattern"
                FOUND=$((FOUND + 1))
              fi
            done
            if [ "$FOUND" -gt 0 ]; then
              exit 1
            fi
            echo "No secrets detected"
          fi

      - name: "Dependency integrity audit"
        run: |
          python3 << 'PYEOF'
          import json, sys

          with open('lake-manifest.json') as f:
              manifest = json.load(f)

          errors = 0
          warnings = 0
          trusted_orgs = {'leanprover', 'leanprover-community'}

          for pkg in manifest.get('packages', []):
              name = pkg.get('name', 'unknown')
              rev = pkg.get('rev', '')
              url = pkg.get('url', '')

              if pkg.get('type') == 'git':
                  if len(rev) != 40:
                      print(f"::error::Package '{name}' has non-pinned rev: {rev}")
                      errors += 1
                  if not url.startswith('https://'):
                      print(f"::error::Package '{name}' uses insecure URL: {url}")
                      errors += 1
                  org = url.split('github.com/')[-1].split('/')[0] if 'github.com/' in url else ''
                  if org and org not in trusted_orgs:
                      print(f"::warning::Package '{name}' from untrusted org: {org}")
                      warnings += 1

          print(f"Audited {len(manifest.get('packages', []))} packages: {errors} errors, {warnings} warnings")
          if errors > 0:
              sys.exit(1)
          PYEOF

      - name: "License compliance"
        run: |
          test -f LICENSE || { echo "::error::LICENSE file missing!"; exit 1; }
          test -d LICENSES || echo "::notice::No LICENSES/ directory (REUSE)"
          echo "License check passed"

      - name: "Upload security reports"
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-reports-${{ needs.changes.outputs.short_sha }}
          path: gitleaks-report.json
          retention-days: 90
          if-no-files-found: ignore

  # ===========================================================================
  # Phase 5: Benchmarks (main branch + manual dispatch only)
  # ===========================================================================
  benchmarks:
    name: "Benchmarks"
    runs-on: arc-runner-set-pw
    needs: [changes, resolve-deps]
    if: >-
      !cancelled() && (
        needs.changes.outputs.benchmarks == 'true' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.build_system == 'true' ||
        needs.changes.outputs.ci == 'true' ||
        github.event_name == 'workflow_dispatch'
      ) && (
        needs.changes.outputs.is_main == 'true' ||
        inputs.force_benchmarks
      )
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Lean"
        uses: ./.github/actions/lean-setup
        with:
          dependency-cache-key: ${{ needs.changes.outputs.cache_prefix }}-deps-${{ hashFiles('lake-manifest.json', 'lakefile.lean') }}
          dependency-cache-restore-keys: |
            ${{ needs.changes.outputs.cache_prefix }}-deps-
          mathlib-cache-key: mathlib-oleans-${{ needs.changes.outputs.mathlib_rev }}-${{ needs.changes.outputs.lean_toolchain }}
          mathlib-cache-restore-keys: |
            mathlib-oleans-${{ needs.changes.outputs.mathlib_rev }}-
          mathlib-cache: "true"
          skip-cache: ${{ inputs.skip_cache && 'true' || 'false' }}

      - name: "System info"
        run: |
          echo "=== CPU ==="
          lscpu | grep -E 'Model name|CPU\(s\)|Thread|MHz|cache' || cat /proc/cpuinfo | head -20
          echo "=== Memory ==="
          free -h
          echo "=== Kernel ==="
          uname -a

      - name: "Run Lean benchmarks (3 runs for stability)"
        run: |
          for i in 1 2 3; do
            echo "=== Run $i/3 ==="
            lake exe bench 2>&1 | tee "bench-lean-run-${i}.txt"
          done

      - name: "Run C baseline (3 runs)"
        run: |
          if [ -f benchmarks/baseline.c ]; then
            gcc -O2 -march=native -fno-builtin -o benchmarks/baseline benchmarks/baseline.c
            for i in 1 2 3; do
              echo "=== C Baseline Run $i/3 ==="
              ./benchmarks/baseline 2>&1 | tee "bench-c-run-${i}.txt"
            done
          fi

      - name: "Benchmark summary"
        run: |
          echo "### Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Lean" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat bench-lean-run-1.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f bench-c-run-1.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### C Baseline" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat bench-c-run-1.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: "Upload benchmark results"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmarks-${{ needs.changes.outputs.short_sha }}
          path: bench-*.txt
          retention-days: 180

  # ===========================================================================
  # Phase 6: Pipeline Summary & Quality Gate Enforcement
  # ===========================================================================
  ci-summary:
    name: "CI Summary"
    runs-on: arc-runner-set-pw
    needs:
      - changes
      - resolve-deps
      - build-lib
      - lint
      - security-scan
      - benchmarks
    if: always()
    timeout-minutes: 5
    steps:
      - name: "Pipeline result matrix"
        run: |
          echo "### CI Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Prepare | Validate Dependencies | \`${{ needs.resolve-deps.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate | Build, Test & Verify | \`${{ needs.build-lib.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate | Lint | \`${{ needs.lint.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security | Scan | \`${{ needs.security-scan.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Perf | Benchmarks | \`${{ needs.benchmarks.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\` | **Actor:** ${{ github.actor }} | **Event:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"

      - name: "Enforce quality gates"
        run: |
          FAILED=0
          CRITICAL_JOBS=(
            "${{ needs.build-lib.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.security-scan.result }}"
          )
          JOB_NAMES=(
            "Build, Test & Verify"
            "Lint & Validate"
            "Security Scan"
          )
          for i in "${!CRITICAL_JOBS[@]}"; do
            RESULT="${CRITICAL_JOBS[$i]}"
            NAME="${JOB_NAMES[$i]}"
            if [ "$RESULT" = "failure" ]; then
              echo "::error::QUALITY GATE FAILED: ${NAME}"
              FAILED=$((FAILED + 1))
            elif [ "$RESULT" = "cancelled" ]; then
              echo "::warning::Job cancelled: ${NAME}"
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} critical quality gate(s) failed — merge blocked"
            exit 1
          fi
          echo "All quality gates passed"
