# =============================================================================
# Radix — Benchmark Regression Pipeline
# =============================================================================
# Runs performance benchmarks on main branch merges and tracks regressions.
# Results are stored as artifacts for historical comparison.
# =============================================================================

name: "Benchmarks"
run-name: "Benchmark — ${{ github.event_name }} on ${{ github.ref_name }}"

on:
  push:
    branches: [main]
    paths:
      - "Radix/**"
      - "c/**"
      - "benchmarks/**"
      - "lakefile.lean"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of benchmark iterations (default: standard)"
        required: false
        type: choice
        options: ["quick", "standard", "thorough"]
        default: "standard"

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Build for Benchmarking (Optimized)
  # ===========================================================================
  build:
    name: "Build (Optimized)"
    runs-on: arc-runner-set-pw
    timeout-minutes: 120
    outputs:
      cache_key: ${{ steps.cache-info.outputs.key }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: "Install elan & Lean"
        uses: leanprover/lean4-action@471d71ad3fcb61d5e7454b5a36b975c434c8e907 # v1.1.5
        with:
          toolchain: ""
          use-mathlib-cache: false

      - name: "Restore .lake cache"
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            .lake/packages
            .lake/build
            ~/.elan
          key: bench-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            bench-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-

      - name: "Fetch dependencies"
        run: lake update

      - name: "Try Mathlib cache"
        run: lake exe cache get || true
        continue-on-error: true

      - name: "Build: Lean benchmarks"
        run: lake build bench

      - name: "Build: C baseline (optimized)"
        run: |
          gcc -O2 -march=native -fno-builtin -o benchmarks/baseline benchmarks/baseline.c
          echo "GCC version: $(gcc --version | head -1)"

      - name: "Cache info"
        id: cache-info
        run: echo "key=bench-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Run Benchmarks — Lean
  # ===========================================================================
  bench-lean:
    name: "Lean Benchmarks"
    runs-on: arc-runner-set-pw
    needs: [build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: "Install elan & Lean"
        uses: leanprover/lean4-action@471d71ad3fcb61d5e7454b5a36b975c434c8e907 # v1.1.5
        with:
          toolchain: ""
          use-mathlib-cache: false

      - name: "Restore build cache"
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            .lake/packages
            .lake/build
            ~/.elan
          key: ${{ needs.build.outputs.cache_key }}

      - name: "Fetch dependencies"
        run: lake update

      - name: "System info"
        run: |
          echo "=== CPU ==="
          lscpu | grep -E 'Model name|CPU\(s\)|MHz|cache' || cat /proc/cpuinfo | head -20
          echo "=== Memory ==="
          free -h
          echo "=== Kernel ==="
          uname -a

      - name: "Run Lean benchmarks (run 1/3)"
        run: lake exe bench 2>&1 | tee bench-run-1.txt

      - name: "Run Lean benchmarks (run 2/3)"
        run: lake exe bench 2>&1 | tee bench-run-2.txt

      - name: "Run Lean benchmarks (run 3/3)"
        run: lake exe bench 2>&1 | tee bench-run-3.txt

      - name: "Upload Lean benchmark results"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bench-lean-${{ github.sha }}
          path: bench-run-*.txt
          retention-days: 180

  # ===========================================================================
  # Run Benchmarks — C Baseline
  # ===========================================================================
  bench-c-baseline:
    name: "C Baseline Benchmarks"
    runs-on: arc-runner-set-pw
    needs: [build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: "Build C baseline"
        run: gcc -O2 -march=native -fno-builtin -o benchmarks/baseline benchmarks/baseline.c

      - name: "Run C baseline (run 1/3)"
        run: ./benchmarks/baseline 2>&1 | tee bench-c-run-1.txt

      - name: "Run C baseline (run 2/3)"
        run: ./benchmarks/baseline 2>&1 | tee bench-c-run-2.txt

      - name: "Run C baseline (run 3/3)"
        run: ./benchmarks/baseline 2>&1 | tee bench-c-run-3.txt

      - name: "Upload C baseline results"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bench-c-baseline-${{ github.sha }}
          path: bench-c-run-*.txt
          retention-days: 180

  # ===========================================================================
  # Benchmark Summary & Comparison
  # ===========================================================================
  bench-report:
    name: "Benchmark Report"
    runs-on: arc-runner-set-pw
    needs: [bench-lean, bench-c-baseline]
    if: always()
    timeout-minutes: 10
    steps:
      - name: "Download all benchmark artifacts"
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: bench-*
          merge-multiple: true

      - name: "Generate benchmark report"
        run: |
          echo "### Performance Benchmark Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "#### Lean Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          for f in bench-run-*.txt; do
            if [ -f "$f" ]; then
              echo "<details><summary>$f</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat "$f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### C Baseline Results" >> "$GITHUB_STEP_SUMMARY"
          for f in bench-c-run-*.txt; do
            if [ -f "$f" ]; then
              echo "<details><summary>$f</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat "$f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
