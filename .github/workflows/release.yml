# =============================================================================
# Radix — Release Pipeline
# =============================================================================
# Automates versioning, changelog generation, and GitHub Release creation.
# Triggered by version tags (v*.*.*) or manual dispatch.
# =============================================================================

name: "Release"
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run (do not publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Validate Release
  # ===========================================================================
  validate:
    name: "Validate Release"
    runs-on: arc-runner-set-pw
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: "Determine version"
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" =~ -rc[0-9]+$ ]] || [ "${{ inputs.prerelease }}" = "true" ]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Release version: $TAG"

      - name: "Validate version format"
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; then
            echo "::error::Invalid version format: $TAG (expected vX.Y.Z or vX.Y.Z-rcN)"
            exit 1
          fi

      - name: "Check CHANGELOG entry"
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"
          if ! grep -Eq "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::Missing CHANGELOG entry for version $VERSION"
            exit 1
          fi

  # ===========================================================================
  # Full Build & Test (Release Quality Gate)
  # ===========================================================================
  build-and-test:
    name: "Build & Test (Release Gate)"
    runs-on: arc-runner-set-pw
    needs: [validate]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Install elan & Lean"
        run: |
          if ! command -v elan &> /dev/null; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          TOOLCHAIN=$(cat lean-toolchain | tr -d '[:space:]')
          elan toolchain install "$TOOLCHAIN" || elan toolchain list | grep -q "$TOOLCHAIN"
          elan default "$TOOLCHAIN"
          lean --version
          lake --version

      - name: "Restore .lake cache"
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .lake/packages
            .lake/build
          key: release-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            release-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-

      - name: "Fetch dependencies & Mathlib cache"
        run: |
          lake update
          lake exe cache get || true

      - name: "Build: Library"
        run: lake build Radix

      - name: "Build & Run: Unit tests"
        run: |
          lake build test
          lake exe test

      - name: "Build & Run: Property tests"
        run: |
          lake build proptest
          lake exe proptest

      - name: "Build & Run: Comprehensive tests"
        run: |
          lake build comptest
          lake exe comptest

      - name: "Build & Run: Examples"
        run: |
          lake build examples
          lake exe examples

      - name: "Build & Run: Lean benchmarks"
        run: |
          lake build bench
          lake exe bench | tee bench-lean.txt

      - name: "Build & Run: C baseline benchmarks"
        run: |
          COMPILER=""
          for candidate in /usr/bin/gcc gcc cc clang; do
            if command -v "$candidate" &> /dev/null; then
              if printf 'int main(void){return 0;}\n' | "$candidate" -x c - -o /tmp/radix-cc-check >/dev/null 2>&1; then
                COMPILER="$candidate"
                break
              fi
            fi
          done
          if [ -z "$COMPILER" ]; then
            echo "::error::A working C compiler is required for release benchmark comparison"
            exit 1
          fi
          rm -f /tmp/radix-cc-check
          "$COMPILER" -O2 -march=native -fno-builtin -o benchmarks/baseline benchmarks/baseline.c
          echo "C baseline compiler: $COMPILER"
          ./benchmarks/baseline | tee bench-c.txt

      - name: "Verify: RingBuffer and CRC benchmark comparison"
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import sys
          from pathlib import Path

          REQUIRED = {
            "Ring Buffer": ["push", "pop", "pushForce"],
            "CRC-32": ["compute-1KB", "streaming-4x256B", "byte-at-a-time-64B"],
          }

          def parse(path, section_aliases):
            results = {}
            current = None
            for raw in Path(path).read_text().splitlines():
              line = raw.strip()
              if not line:
                continue
              if line.endswith(":") and "ns/op" not in line and "accumulator" not in line:
                current = section_aliases.get(line[:-1])
                continue
              match = re.match(r"([A-Za-z0-9-]+): ([0-9]+(?:\.[0-9]+)?) ns/op", line)
              if match and current is not None:
                results[(current, match.group(1))] = float(match.group(2))
            return results

          lean_results = parse(
            "bench-lean.txt",
            {"Ring Buffer (v0.2.0)": "Ring Buffer", "CRC-32 (v0.2.0)": "CRC-32"},
          )
          c_results = parse(
            "bench-c.txt",
            {"Ring Buffer": "Ring Buffer", "CRC-32": "CRC-32"},
          )

          errors = []
          rows = []
          for section, ops in REQUIRED.items():
            for op in ops:
              lean_ns = lean_results.get((section, op))
              c_ns = c_results.get((section, op))
              if lean_ns is None or c_ns is None:
                errors.append(f"Missing benchmark result for {section} / {op}")
                continue
              if lean_ns <= 0 or c_ns <= 0:
                errors.append(
                  f"Non-positive ns/op for {section} / {op}: lean={lean_ns}, c={c_ns}"
                )
                continue
              rows.append((section, op, lean_ns, c_ns, lean_ns / c_ns))

          if errors:
            for err in errors:
              print(f"::error::{err}")
            sys.exit(1)

          summary = [
            "### Benchmark Comparison",
            "",
            "| Section | Operation | Lean ns/op | C baseline ns/op | Ratio |",
            "|---------|-----------|------------|------------------|-------|",
          ]
          for section, op, lean_ns, c_ns, ratio in rows:
              summary.append(f"| {section} | {op} | {lean_ns:.3f} | {c_ns:.3f} | {ratio:.2f}x |")

          summary_text = "\n".join(summary)
          print(summary_text)
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
            with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write(summary_text)
              handle.write("\n")
          PYEOF

      - name: "Verify: No sorry in proofs"
        run: |
          SORRY_COUNT=$(grep -rn '\bsorry\b' Radix/ | grep -v '\.lake/' | wc -l)
          if [ "$SORRY_COUNT" -gt 0 ]; then
            echo "::error::Cannot release with $SORRY_COUNT 'sorry' in codebase"
            grep -rn '\bsorry\b' Radix/ | grep -v '\.lake/'
            exit 1
          fi
          echo "No sorry found ✅"

  # ===========================================================================
  # Generate Release Artifacts
  # ===========================================================================
  release-artifacts:
    name: "Generate Artifacts"
    runs-on: arc-runner-set-pw
    needs: [validate, build-and-test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: "Generate changelog for this release"
        run: |
          TAG="${{ needs.validate.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1 || echo "")

          echo "# Release $TAG" > release-notes.md
          echo "" >> release-notes.md
          echo "## Changes" >> release-notes.md
          echo "" >> release-notes.md

          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> release-notes.md
          else
            git log --pretty=format:"- %s (%h)" >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Proof Census" >> release-notes.md
          echo "" >> release-notes.md
          THEOREMS=$(grep -rn '^theorem\|^  theorem' Radix/ | wc -l)
          LEMMAS=$(grep -rn '^lemma\|^  lemma' Radix/ | wc -l)
          echo "- Theorems: $THEOREMS" >> release-notes.md
          echo "- Lemmas: $LEMMAS" >> release-notes.md

          echo "" >> release-notes.md
          echo "## Dependencies" >> release-notes.md
          echo "" >> release-notes.md
          echo "- Lean: $(cat lean-toolchain | tr -d '[:space:]')" >> release-notes.md

      - name: "Generate SBOM"
        run: |
          python3 << 'PYEOF'
          import json, datetime

          with open('lake-manifest.json') as f:
              manifest = json.load(f)

          sbom = {
              "bomFormat": "CycloneDX",
              "specVersion": "1.4",
              "version": 1,
              "metadata": {
                  "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
                  "component": {
                      "type": "library",
                      "name": "radix",
                      "version": "${{ needs.validate.outputs.version }}"
                  }
              },
              "components": []
          }

          for pkg in manifest.get('packages', []):
              comp = {
                  "type": "library",
                  "name": pkg.get('name', 'unknown'),
                  "version": pkg.get('rev', 'unknown')[:12],
                  "purl": f"pkg:github/{pkg.get('url', '').replace('https://github.com/', '')}@{pkg.get('rev', '')}",
                  "externalReferences": [
                      {"type": "vcs", "url": pkg.get('url', '')}
                  ]
              }
              sbom["components"].append(comp)

          with open('sbom.json', 'w') as f:
              json.dump(sbom, f, indent=2)
          print(f"Generated SBOM with {len(sbom['components'])} components")
          PYEOF

      - name: "Upload release artifacts"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-artifacts-${{ needs.validate.outputs.version }}
          path: |
            release-notes.md
            sbom.json
          retention-days: 365

  # ===========================================================================
  # Publish GitHub Release
  # ===========================================================================
  publish:
    name: "Publish Release"
    runs-on: arc-runner-set-pw
    needs: [validate, build-and-test, release-artifacts]
    if: ${{ !inputs.dry_run }}
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Download release artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts-${{ needs.validate.outputs.version }}

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: "Radix ${{ needs.validate.outputs.version }}"
          body_path: release-notes.md
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          files: |
            sbom.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
