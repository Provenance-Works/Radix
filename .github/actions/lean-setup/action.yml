# =============================================================================
# Radix — Lean 4 Toolchain Setup (Composite Action)
# =============================================================================
# Reusable setup: installs elan/Lean, restores multi-layer caches, fetches deps.
# Eliminates ~20 lines of boilerplate per job.
# =============================================================================

name: "Lean 4 Setup"
description: "Install Lean toolchain and restore multi-layer caches"

outputs:
  legacy-cache-hit:
    description: "Whether the legacy build cache had an exact hit"
    value: ${{ steps.legacy-cache.outputs.cache-hit }}
  dependency-cache-hit:
    description: "Whether the dependency cache had an exact hit"
    value: ${{ steps.dependency-cache.outputs.cache-hit }}
  mathlib-cache-hit:
    description: "Whether the Mathlib oleans cache had an exact hit"
    value: ${{ steps.mathlib-cache-restore.outputs.cache-hit }}

inputs:
  cache-key:
    description: "Primary cache key to restore"
    required: false
    default: ""
  cache-restore-keys:
    description: "Fallback restore keys (newline-separated)"
    required: false
    default: ""
  dependency-cache-key:
    description: "Primary dependency cache key to restore"
    required: false
    default: ""
  dependency-cache-restore-keys:
    description: "Fallback dependency cache keys (newline-separated)"
    required: false
    default: ""
  mathlib-cache-key:
    description: "Primary Mathlib oleans cache key to restore"
    required: false
    default: ""
  mathlib-cache-restore-keys:
    description: "Fallback Mathlib oleans cache keys (newline-separated)"
    required: false
    default: ""
  skip-cache:
    description: "Skip all cache operations"
    required: false
    default: "false"
  lake-update:
    description: "Run `lake update` after setup"
    required: false
    default: "true"
  mathlib-cache:
    description: "Try `lake exe cache get` for Mathlib oleans"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: "Install elan & Lean toolchain"
      shell: bash
      run: |
        if ! command -v elan &> /dev/null; then
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
        fi
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.elan/bin:$PATH"
        TOOLCHAIN=$(cat lean-toolchain | tr -d '[:space:]')
        elan toolchain install "$TOOLCHAIN" || elan toolchain list | grep -q "$TOOLCHAIN"
        elan default "$TOOLCHAIN"
        lean --version
        lake --version

    - name: "Restore legacy build cache"
      if: inputs.skip-cache != 'true' && inputs.cache-key != ''
      id: legacy-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          .lake/packages
          .lake/build
        key: ${{ inputs.cache-key }}
        restore-keys: ${{ inputs.cache-restore-keys }}

    - name: "Restore dependency cache"
      if: inputs.skip-cache != 'true' && inputs.dependency-cache-key != ''
      id: dependency-cache
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          .lake/packages
          !.lake/packages/mathlib/.lake/build
        key: ${{ inputs.dependency-cache-key }}
        restore-keys: ${{ inputs.dependency-cache-restore-keys }}

    - name: "Restore Mathlib oleans cache"
      if: inputs.skip-cache != 'true' && inputs.mathlib-cache-key != ''
      id: mathlib-cache-restore
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: .lake/packages/mathlib/.lake/build
        key: ${{ inputs.mathlib-cache-key }}
        restore-keys: ${{ inputs.mathlib-cache-restore-keys }}

    - name: "Fetch dependencies"
      if: inputs.lake-update == 'true'
      shell: bash
      run: |
        if [ "${{ steps.legacy-cache.outputs.cache-hit }}" = "true" ] || [ "${{ steps.dependency-cache.outputs.cache-hit }}" = "true" ]; then
          echo "Dependency cache hit — skipping lake update"
        else
          lake update
        fi

    - name: "Fetch Mathlib oleans cache"
      if: inputs.mathlib-cache == 'true' && steps.mathlib-cache-restore.outputs.cache-hit != 'true'
      shell: bash
      run: lake exe cache get || echo "::warning::Mathlib cache get failed — will build from source"
