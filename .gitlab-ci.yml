# =============================================================================
# Radix — GitLab CI/CD Pipeline (Enterprise-Grade)
# =============================================================================
#
# Runner: Shell executor, tag: normal
# Cache: Aggressive 4-layer caching for Lean 4 + Mathlib builds
#
# Pipeline Architecture (DAG-optimized for maximum parallelism):
#
#   .pre ─── cache_warmup
#
#   prepare ─── resolve_dependencies ──────────────────────────────────────────┐
#                                                                              │
#   validate (parallel, needs: []) ─── lint_yaml                               │
#                                  ─── lint_json                               │
#                                  ─── lint_lean_sources                       │
#                                  ─── lint_docs                               │
#                                                                              │
#   build ─── build_library ──────────────┬── build_tests ──────────┐          │
#                                         ├── build_examples        │          │
#                                         └── build_benchmarks      │          │
#                                                                   │          │
#   test (parallel) ─── test_unit ──────────────────────────────────┤          │
#                   ─── test_property ──────────────────────────────┤          │
#                   ─── test_comprehensive ─────────────────────────┤          │
#                   ─── test_examples ──────────────────────────────┤          │
#                                                                   │          │
#   analyze ─── verify_proofs ──────────────────────────────────────┤          │
#           ─── code_metrics (needs: []) ───────────────────────────┤          │
#                                                                   │          │
#   security (parallel, needs: []) ─── secret_detection ────────────┤          │
#                                  ─── dependency_audit ────────────┤          │
#                                  ─── license_compliance ──────────┤          │
#                                                                   │          │
#   benchmark ─── benchmark_lean ───────────────────────────────────┤          │
#             ─── benchmark_c_baseline ─────────────────────────────┤          │
#                                                                   │          │
#   release ─── generate_release_notes ─────────────────────────────┤          │
#           ─── create_release ─────────────────────────────────────┤          │
#                                                                   │          │
#   notify ─── pipeline_success ────────────────────────────────────┘          │
#          ─── pipeline_failure                                                │
#                                                                              │
#   .post ─── cleanup_workspace ───────────────────────────────────────────────┘
#
# =============================================================================

# ---------------------------------------------------------------------------
# Workflow Control — Prevent Duplicate Pipelines
# ---------------------------------------------------------------------------
workflow:
  name: "$CI_COMMIT_REF_NAME — $CI_PIPELINE_SOURCE"
  auto_cancel:
    on_new_commit: interruptible
    on_job_failure: none
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      variables:
        PIPELINE_TYPE: "release"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        PIPELINE_TYPE: "merge_request"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        PIPELINE_TYPE: "default_branch"
    - if: $CI_COMMIT_BRANCH =~ /^release\//
      variables:
        PIPELINE_TYPE: "release_branch"
    - if: $CI_COMMIT_BRANCH
      variables:
        PIPELINE_TYPE: "feature_branch"
    - if: $CI_PIPELINE_SOURCE == "schedule"
      variables:
        PIPELINE_TYPE: "scheduled"

# ---------------------------------------------------------------------------
# Stages — Multi-Layer DAG Pipeline
# ---------------------------------------------------------------------------
stages:
  - .pre
  - prepare
  - validate
  - build
  - test
  - analyze
  - security
  - benchmark
  - release
  - notify
  - .post

# ---------------------------------------------------------------------------
# Global Variables
# ---------------------------------------------------------------------------
variables:
  # Git optimization
  GIT_DEPTH: 50
  GIT_STRATEGY: fetch
  GIT_CLEAN_FLAGS: "-ffdx -e .lake/ -e .elan/"

  # Lean / Lake configuration
  ELAN_HOME: "$CI_PROJECT_DIR/.elan"

  # Cache fallback
  CACHE_FALLBACK_KEY: "lean-global-fallback"

# ---------------------------------------------------------------------------
# Default Job Configuration
# ---------------------------------------------------------------------------
default:
  tags:
    - normal
  timeout: 60m
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure

# =============================================================================
# Templates — DRY Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Lean Toolchain Setup (shared before_script)
# ---------------------------------------------------------------------------
.lean_setup:
  before_script:
    - |
      # Ensure elan is installed
      if [ ! -f "$ELAN_HOME/bin/elan" ]; then
        echo "Installing elan..."
        curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
      fi
      export PATH="$ELAN_HOME/bin:$PATH"
    - |
      # Install required toolchain
      TOOLCHAIN=$(cat lean-toolchain | tr -d '[:space:]')
      echo "Required: $TOOLCHAIN"
      elan toolchain install "$TOOLCHAIN"
      elan default "$TOOLCHAIN"
      echo "Active: $(lean --version)"
    - |
      # Verify lake
      which lake || { echo "ERROR: lake not found"; exit 1; }

# ---------------------------------------------------------------------------
# Cache Templates (4-layer architecture)
# ---------------------------------------------------------------------------

# L1: Elan toolchain (rarely changes)
.cache_elan:
  cache:
    - key:
        files:
          - lean-toolchain
        prefix: "elan"
      paths:
        - .elan/
      policy: pull-push
      when: on_success

# L2: Lake packages (changes on dependency updates)
.cache_lake_packages:
  cache:
    - key:
        files:
          - lake-manifest.json
          - lakefile.lean
        prefix: "lake-pkg"
      paths:
        - .lake/packages/
      policy: pull-push
      when: on_success

# L3: Mathlib oleans (largest layer ~2-4GB)
.cache_mathlib_oleans:
  cache:
    - key:
        files:
          - lake-manifest.json
        prefix: "mathlib-oleans"
      paths:
        - .lake/packages/mathlib/.lake/build/
      policy: pull-push
      when: on_success

# L4: Radix build artifacts (changes every commit)
.cache_radix_build:
  cache:
    - key: "radix-build-${CI_COMMIT_SHORT_SHA}"
      paths:
        - .lake/build/
      policy: pull-push
      when: on_success
      unprotect: true

# Combined read-only cache (for downstream consumer jobs)
.cache_readonly_all:
  cache:
    - key:
        files:
          - lean-toolchain
        prefix: "elan"
      paths:
        - .elan/
      policy: pull
    - key:
        files:
          - lake-manifest.json
          - lakefile.lean
        prefix: "lake-pkg"
      paths:
        - .lake/packages/
      policy: pull
    - key:
        files:
          - lake-manifest.json
        prefix: "mathlib-oleans"
      paths:
        - .lake/packages/mathlib/.lake/build/
      policy: pull
    - key: "radix-build-${CI_COMMIT_SHORT_SHA}"
      paths:
        - .lake/build/
      policy: pull

# Full read-write cache (for build producer jobs)
.cache_full_rw:
  cache:
    - key:
        files:
          - lean-toolchain
        prefix: "elan"
      paths:
        - .elan/
      policy: pull-push
      when: on_success
    - key:
        files:
          - lake-manifest.json
          - lakefile.lean
        prefix: "lake-pkg"
      paths:
        - .lake/packages/
      policy: pull-push
      when: on_success
    - key:
        files:
          - lake-manifest.json
        prefix: "mathlib-oleans"
      paths:
        - .lake/packages/mathlib/.lake/build/
      policy: pull-push
      when: on_success
    - key: "radix-build-${CI_COMMIT_SHORT_SHA}"
      paths:
        - .lake/build/
      policy: pull-push
      when: on_success
      unprotect: true

# ---------------------------------------------------------------------------
# Rule Templates
# ---------------------------------------------------------------------------
.rules_mr_main_tag:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

.rules_mr_main:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.rules_main_only:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.rules_tag_only:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# =============================================================================
# STAGE: .pre — Cache Warmup
# =============================================================================

cache_warmup:
  stage: .pre
  extends:
    - .lean_setup
    - .cache_elan
    - .cache_lake_packages
  script:
    - echo "=== Cache Warmup ==="
    - 'echo "Lean: $(lean --version)"'
    - 'echo "Lake: $(lake --version)"'
    - 'echo "Pipeline: $PIPELINE_TYPE"'
    - 'echo "Runner: $CI_RUNNER_DESCRIPTION ($CI_RUNNER_ID)"'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: manual
      allow_failure: true

# =============================================================================
# STAGE: prepare — Dependency Resolution
# =============================================================================

resolve_dependencies:
  stage: prepare
  extends:
    - .lean_setup
    - .cache_full_rw
  timeout: 120m
  script:
    - echo "=== Resolving dependencies ==="
    - lake update

    # Fetch pre-built Mathlib oleans
    - |
      echo "=== Fetching Mathlib cache ==="
      lake exe cache get 2>&1 || {
        echo "WARNING: Mathlib cache get failed. Will build from source."
      }

    # Verify dependency integrity
    - |
      echo "=== Verifying dependencies ==="
      python3 << 'PYEOF'
      import json, sys
      with open('lake-manifest.json') as f:
          manifest = json.load(f)
      errors = 0
      for pkg in manifest.get('packages', []):
          name = pkg.get('name', 'unknown')
          rev = pkg.get('rev', '')
          url = pkg.get('url', '')
          if pkg.get('type') == 'git':
              if len(rev) != 40:
                  print(f"ERROR: Package '{name}' has non-pinned rev: {rev}")
                  errors += 1
              if not url.startswith('https://'):
                  print(f"ERROR: Package '{name}' uses insecure URL: {url}")
                  errors += 1
          print(f"  OK: {name} @ {rev[:12]}...")
      if errors > 0:
          sys.exit(1)
      print(f"\nAll {len(manifest.get('packages', []))} dependencies verified")
      PYEOF
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"
  artifacts:
    paths:
      - .lake/packages/
    expire_in: 4 hours
    when: on_success

# =============================================================================
# STAGE: validate — Lint & Format (parallel, no build dependency)
# =============================================================================

lint_yaml:
  stage: validate
  timeout: 5m
  needs: []
  script:
    - echo "=== Validating YAML ==="
    - |
      ERRORS=0
      find . -name '*.yml' -o -name '*.yaml' | grep -v '.lake/' | while read f; do
        if python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1; then
          echo "  OK: $f"
        else
          echo "  FAIL: $f"
          ERRORS=$((ERRORS + 1))
        fi
      done
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "**/*.yml"
          - "**/*.yaml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint_json:
  stage: validate
  timeout: 5m
  needs: []
  script:
    - echo "=== Validating JSON ==="
    - python3 -c "import json; json.load(open('lake-manifest.json'))"
    - 'echo "  OK: lake-manifest.json"'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - lake-manifest.json
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint_lean_sources:
  stage: validate
  timeout: 10m
  needs: []
  script:
    - echo "=== Lean source quality ==="

    # Trailing whitespace
    - |
      ERRORS=0
      while IFS= read -r file; do
        if grep -Pn '\s+$' "$file" > /dev/null 2>&1; then
          echo "WARNING: Trailing whitespace in $file"
          ERRORS=$((ERRORS + 1))
        fi
      done < <(find . -name '*.lean' -not -path './.lake/*')
      if [ "$ERRORS" -gt 0 ]; then
        echo "Trailing whitespace in $ERRORS file(s) (non-blocking)"
      fi

    # TODO/FIXME markers
    - |
      echo "=== TODO/FIXME markers ==="
      find . -name '*.lean' -not -path './.lake/*' -exec grep -Hn 'TODO\|FIXME\|HACK\|XXX' {} \; | head -50 || echo "None found"

    # Validate core files
    - 'test -s lakefile.lean && echo "OK: lakefile.lean"'
    - 'test -s lean-toolchain && echo "OK: lean-toolchain"'

    # Toolchain format
    - |
      TOOLCHAIN=$(cat lean-toolchain | tr -d '[:space:]')
      if [[ ! "$TOOLCHAIN" =~ ^leanprover/lean4: ]]; then
        echo "ERROR: Unexpected toolchain format: $TOOLCHAIN"
        exit 1
      fi
      echo "Toolchain: $TOOLCHAIN"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint_docs:
  stage: validate
  timeout: 5m
  needs: []
  script:
    - echo "=== Documentation checks ==="

    # Required files
    - |
      MISSING=0
      for f in README.md CHANGELOG.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md LICENSE; do
        if [ -f "$f" ]; then
          echo "  OK: $f"
        else
          echo "  MISSING: $f"
          MISSING=$((MISSING + 1))
        fi
      done
      if [ "$MISSING" -gt 0 ]; then
        echo "WARNING: $MISSING required file(s) missing"
      fi

    # Broken links in docs
    - |
      find docs -name '*.md' 2>/dev/null | while read f; do
        grep -oP '\[.*?\]\(\K[^)]+' "$f" 2>/dev/null | while read link; do
          if [[ "$link" =~ ^https?:// ]] || [[ "$link" =~ ^# ]]; then
            continue
          fi
          CLEAN_LINK=$(echo "$link" | cut -d'#' -f1)
          if [ -n "$CLEAN_LINK" ]; then
            DIR=$(dirname "$f")
            TARGET="$DIR/$CLEAN_LINK"
            if [ ! -e "$TARGET" ]; then
              echo "WARNING: Broken link in $f: $link -> $TARGET"
            fi
          fi
        done
      done
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "docs/**"
          - "*.md"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# STAGE: build — Parallel Build Targets
# =============================================================================

.build_template:
  stage: build
  extends:
    - .lean_setup
    - .cache_full_rw
  timeout: 90m
  needs:
    - job: resolve_dependencies
      optional: true

build_library:
  extends: .build_template
  script:
    - echo "=== Building Radix library ==="
    - lake update
    - time lake build Radix 2>&1 | tail -20
    - echo "=== Library build complete ==="
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "Radix/**"
          - "Radix.lean"
          - "lakefile.lean"
          - "lean-toolchain"
          - "lake-manifest.json"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"

build_tests:
  extends: .build_template
  needs:
    - job: build_library
      optional: true
  script:
    - echo "=== Building test targets ==="
    - lake update
    - time lake build test 2>&1 | tail -10
    - time lake build proptest 2>&1 | tail -10
    - time lake build comptest 2>&1 | tail -10
    - echo "=== Test build complete ==="
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "Radix/**"
          - "tests/**"
          - "test_helpers.lean"
          - "lakefile.lean"
          - "lean-toolchain"
          - "lake-manifest.json"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build_examples:
  extends: .build_template
  needs:
    - job: build_library
      optional: true
  script:
    - echo "=== Building examples ==="
    - lake update
    - time lake build examples 2>&1 | tail -10
    - echo "=== Examples build complete ==="
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "Radix/**"
          - "examples/**"
          - "lakefile.lean"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build_benchmarks:
  extends: .build_template
  needs:
    - job: build_library
      optional: true
  script:
    - echo "=== Building benchmarks ==="
    - lake update
    - time lake build bench 2>&1 | tail -10
    - |
      if [ -f benchmarks/baseline.c ]; then
        gcc -O2 -march=native -fno-builtin -o benchmarks/baseline benchmarks/baseline.c
        echo "C baseline compiled: $(gcc --version | head -1)"
      fi
    - echo "=== Benchmark build complete ==="
  artifacts:
    paths:
      - benchmarks/baseline
    expire_in: 2 hours
    when: on_success
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - "Radix/**"
          - "benchmarks/**"
          - "lakefile.lean"
    - if: $CI_COMMIT_TAG

# =============================================================================
# STAGE: test — Parallel Test Execution
# =============================================================================

.test_template:
  stage: test
  extends:
    - .lean_setup
    - .cache_readonly_all
  timeout: 45m
  needs:
    - job: build_tests
      optional: true

test_unit:
  extends: .test_template
  script:
    - echo "=== Unit tests ==="
    - lake update
    - |
      START=$(date +%s)
      lake exe test 2>&1 | tee test-unit-output.txt
      EXIT_CODE=$?
      DURATION=$(($(date +%s) - START))
      echo "Duration: ${DURATION}s"
      exit $EXIT_CODE
  artifacts:
    when: always
    paths:
      - test-unit-output.txt
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "Radix/**"
          - "tests/**"
          - "test_helpers.lean"
          - "lakefile.lean"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test_property:
  extends: .test_template
  timeout: 60m
  script:
    - echo "=== Property-based tests ==="
    - lake update
    - |
      START=$(date +%s)
      lake exe proptest 2>&1 | tee test-property-output.txt
      EXIT_CODE=$?
      DURATION=$(($(date +%s) - START))
      echo "Duration: ${DURATION}s"
      exit $EXIT_CODE
  artifacts:
    when: always
    paths:
      - test-property-output.txt
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "Radix/**"
          - "tests/**"
          - "lakefile.lean"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test_comprehensive:
  extends: .test_template
  timeout: 90m
  script:
    - echo "=== Comprehensive tests ==="
    - lake update
    - |
      START=$(date +%s)
      lake exe comptest 2>&1 | tee test-comprehensive-output.txt
      EXIT_CODE=$?
      DURATION=$(($(date +%s) - START))
      echo "Duration: ${DURATION}s"
      exit $EXIT_CODE
  artifacts:
    when: always
    paths:
      - test-comprehensive-output.txt
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "Radix/**"
          - "tests/**"
          - "lakefile.lean"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test_examples:
  extends: .test_template
  timeout: 15m
  needs:
    - job: build_examples
      optional: true
  script:
    - echo "=== Examples validation ==="
    - lake update
    - lake exe examples 2>&1 | tee test-examples-output.txt
    - echo "Examples validated"
  artifacts:
    when: always
    paths:
      - test-examples-output.txt
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "Radix/**"
          - "examples/**"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# =============================================================================
# STAGE: analyze — Proof Verification & Code Metrics
# =============================================================================

verify_proofs:
  stage: analyze
  extends:
    - .lean_setup
    - .cache_readonly_all
  timeout: 120m
  needs:
    - job: build_library
      optional: true
  script:
    - echo "=== Proof Verification ==="
    - lake update
    - time lake build Radix 2>&1 | tail -20
    - echo ""

    # Theorem/lemma census
    - |
      echo "=== Proof Census ==="
      THEOREMS=$(grep -rn '^theorem\|^  theorem' Radix/ | wc -l)
      LEMMAS=$(grep -rn '^lemma\|^  lemma' Radix/ | wc -l)
      INSTANCES=$(grep -rn '^instance\|^  instance' Radix/ | wc -l)
      DEFS=$(grep -rn '^def\|^  def\|^private def' Radix/ | wc -l)
      AXIOMS=$(grep -rn '^axiom\|^  axiom' Radix/ | wc -l)
      echo "Theorems:    $THEOREMS"
      echo "Lemmas:      $LEMMAS"
      echo "Instances:   $INSTANCES"
      echo "Definitions: $DEFS"
      echo "Axioms:      $AXIOMS"

    # Zero-sorry check (hard fail)
    - |
      echo ""
      echo "=== Zero-Sorry Audit ==="
      SORRY_COUNT=$(grep -rn '\bsorry\b' Radix/ | grep -v '\.lake/' | wc -l)
      if [ "$SORRY_COUNT" -gt 0 ]; then
        echo "ERROR: Found $SORRY_COUNT 'sorry' occurrences!"
        grep -rn '\bsorry\b' Radix/ | grep -v '\.lake/'
        exit 1
      fi
      echo "Zero sorry — all proofs complete"

    # Trust assumptions audit
    - |
      echo ""
      echo "=== Trust Assumptions ==="
      TRUST_ITEMS=$(grep -rn 'trust_\|@\[implemented_by\]\|native_decide' Radix/ | grep -v '\.lake/' | wc -l)
      echo "Trust assumptions: $TRUST_ITEMS"
      grep -rn 'trust_\|@\[implemented_by\]\|native_decide' Radix/ | grep -v '\.lake/' || echo "  (none)"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - "Radix/**"
          - "lakefile.lean"
          - "lean-toolchain"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"

code_metrics:
  stage: analyze
  timeout: 10m
  needs: []
  script:
    - echo "=== Code Metrics ==="

    # Lines of code
    - |
      echo "--- Lines of Code ---"
      LEAN_LOC=$(find Radix/ -name '*.lean' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
      TEST_LOC=$(find tests/ -name '*.lean' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
      BENCH_LOC=$(find benchmarks/ -name '*.lean' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
      EXAMPLE_LOC=$(find examples/ -name '*.lean' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
      DOC_LOC=$(find docs/ -name '*.md' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
      echo "Library:    $LEAN_LOC lines"
      echo "Tests:      $TEST_LOC lines"
      echo "Benchmarks: $BENCH_LOC lines"
      echo "Examples:   $EXAMPLE_LOC lines"
      echo "Docs:       $DOC_LOC lines"

    # Module count by subsystem
    - |
      echo ""
      echo "--- Modules by Subsystem ---"
      for dir in Radix/Word Radix/Bit Radix/Bytes Radix/Memory Radix/Binary Radix/System Radix/Concurrency Radix/BareMetal; do
        if [ -d "$dir" ]; then
          COUNT=$(find "$dir" -name '*.lean' | wc -l)
          echo "  $dir: $COUNT files"
        fi
      done
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"

# =============================================================================
# STAGE: security — Parallel Security Scanning (no build dependency)
# =============================================================================

secret_detection:
  stage: security
  timeout: 10m
  needs: []
  script:
    - echo "=== Secret Detection ==="
    - |
      if command -v gitleaks &> /dev/null; then
        gitleaks detect --source . --verbose --no-git 2>&1 | tee gitleaks-report.txt || {
          echo "ERROR: Secrets detected!"
          exit 1
        }
      else
        echo "gitleaks not available — manual scan"
        FOUND=0
        for pattern in \
          'AKIA[0-9A-Z]{16}' \
          'ghp_[a-zA-Z0-9]{36}' \
          'gho_[a-zA-Z0-9]{36}' \
          'glpat-[a-zA-Z0-9_-]{20}' \
          'sk-[a-zA-Z0-9]{48}' \
          '-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'; do
          if grep -rPn "$pattern" --include='*.lean' --include='*.yml' --include='*.yaml' --include='*.json' . 2>/dev/null | grep -v '.lake/'; then
            echo "ERROR: Potential secret: $pattern"
            FOUND=$((FOUND + 1))
          fi
        done
        if [ "$FOUND" -gt 0 ]; then
          exit 1
        fi
        echo "No secrets detected"
      fi
  artifacts:
    when: always
    paths:
      - gitleaks-report.txt
    expire_in: 90 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

dependency_audit:
  stage: security
  timeout: 10m
  needs: []
  script:
    - echo "=== Dependency Audit ==="
    - |
      python3 << 'PYEOF'
      import json, sys

      with open('lake-manifest.json') as f:
          manifest = json.load(f)

      errors = 0
      warnings = 0
      trusted_orgs = {'leanprover', 'leanprover-community'}

      print("=" * 60)
      print("DEPENDENCY AUDIT REPORT")
      print("=" * 60)

      for pkg in manifest.get('packages', []):
          name = pkg.get('name', 'unknown')
          rev = pkg.get('rev', '')
          url = pkg.get('url', '')

          print(f"\n  {name}:")
          print(f"    Rev: {rev[:12]}...")
          print(f"    URL: {url}")

          if pkg.get('type') == 'git':
              if len(rev) != 40:
                  print(f"    ERROR: Non-pinned revision!")
                  errors += 1
              else:
                  print(f"    OK: Pinned to full SHA")

              if not url.startswith('https://'):
                  print(f"    ERROR: Insecure URL!")
                  errors += 1
              else:
                  print(f"    OK: HTTPS")

              org = url.split('github.com/')[-1].split('/')[0] if 'github.com/' in url else ''
              if org in trusted_orgs:
                  print(f"    OK: Trusted org ({org})")
              elif org:
                  print(f"    WARNING: Unknown org ({org})")
                  warnings += 1

      print(f"\n{'=' * 60}")
      print(f"TOTAL: {len(manifest.get('packages', []))} packages, {errors} errors, {warnings} warnings")

      if errors > 0:
          sys.exit(1)
      PYEOF
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - lake-manifest.json
          - lakefile.lean
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

license_compliance:
  stage: security
  timeout: 5m
  needs: []
  script:
    - echo "=== License Compliance ==="
    - 'test -f LICENSE || { echo "ERROR: LICENSE file missing!"; exit 1; }'
    - echo "LICENSE present"
    - test -d LICENSES && echo "REUSE LICENSES/ directory present" || true
    - echo "License compliance passed"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# =============================================================================
# STAGE: benchmark — Performance Regression Detection
# =============================================================================

benchmark_lean:
  stage: benchmark
  extends:
    - .lean_setup
    - .cache_readonly_all
  timeout: 30m
  resource_group: benchmarks
  needs:
    - job: build_benchmarks
      optional: true
  script:
    - echo "=== System Info ==="
    - lscpu | grep -E 'Model name|CPU\(s\)|Thread|MHz|cache' || cat /proc/cpuinfo | head -20
    - free -h
    - uname -a

    - echo "=== Lean Benchmarks (3 runs) ==="
    - lake update
    - |
      for i in 1 2 3; do
        echo "--- Run $i/3 ---"
        lake exe bench 2>&1 | tee "benchmark-lean-run${i}.txt"
      done
    - echo "=== Lean benchmarks complete ==="
  artifacts:
    when: always
    paths:
      - benchmark-lean-run*.txt
    expire_in: 180 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - "Radix/**"
          - "benchmarks/**"
    - if: $CI_COMMIT_TAG

benchmark_c_baseline:
  stage: benchmark
  timeout: 15m
  resource_group: benchmarks
  needs:
    - job: build_benchmarks
      optional: true
  script:
    - echo "=== C Baseline Benchmarks (3 runs) ==="
    - |
      if [ -f benchmarks/baseline ]; then
        EXEC=benchmarks/baseline
      elif [ -f benchmarks/baseline.c ]; then
        gcc -O2 -march=native -fno-builtin -o benchmarks/baseline benchmarks/baseline.c
        EXEC=benchmarks/baseline
      else
        echo "No C baseline found — skipping"
        exit 0
      fi
    - |
      for i in 1 2 3; do
        echo "--- Run $i/3 ---"
        ./$EXEC 2>&1 | tee "benchmark-c-run${i}.txt"
      done
    - echo "=== C baselines complete ==="
  artifacts:
    when: always
    paths:
      - benchmark-c-run*.txt
    expire_in: 180 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - "benchmarks/**"
    - if: $CI_COMMIT_TAG

# =============================================================================
# STAGE: release — Release Automation (Tag Pipelines Only)
# =============================================================================

generate_release_notes:
  stage: release
  timeout: 10m
  needs:
    - job: test_unit
    - job: test_property
    - job: test_comprehensive
    - job: verify_proofs
  script:
    - echo "=== Generating release notes ==="
    - |
      TAG="$CI_COMMIT_TAG"
      PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1 || echo "")

      echo "# Release $TAG" > release-notes.md
      echo "" >> release-notes.md
      echo "## Changes" >> release-notes.md
      echo "" >> release-notes.md

      if [ -n "$PREV_TAG" ]; then
        echo "Changes since $PREV_TAG:" >> release-notes.md
        git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> release-notes.md
      else
        git log --pretty=format:"- %s (%h)" --max-count=50 >> release-notes.md
      fi

      echo "" >> release-notes.md
      echo "" >> release-notes.md
      echo "## Proof Census" >> release-notes.md
      echo "" >> release-notes.md
      THEOREMS=$(grep -rn '^theorem\|^  theorem' Radix/ | wc -l)
      LEMMAS=$(grep -rn '^lemma\|^  lemma' Radix/ | wc -l)
      echo "- Theorems: $THEOREMS" >> release-notes.md
      echo "- Lemmas: $LEMMAS" >> release-notes.md
      echo "" >> release-notes.md
      echo "## Environment" >> release-notes.md
      echo "" >> release-notes.md
      echo "- Lean: $(cat lean-toolchain | tr -d '[:space:]')" >> release-notes.md

    # Generate SBOM (CycloneDX)
    - |
      python3 << 'PYEOF'
      import json, datetime
      with open('lake-manifest.json') as f:
          manifest = json.load(f)
      tag = "$CI_COMMIT_TAG" or "dev"
      sbom = {
          "bomFormat": "CycloneDX",
          "specVersion": "1.4",
          "version": 1,
          "metadata": {
              "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
              "component": {
                  "type": "library",
                  "name": "radix",
                  "version": tag
              }
          },
          "components": [{
              "type": "library",
              "name": p.get("name", ""),
              "version": p.get("rev", "")[:12],
              "purl": f"pkg:github/{p.get('url','').replace('https://github.com/','')}"
          } for p in manifest.get("packages", [])]
      }
      with open("sbom.json", "w") as f:
          json.dump(sbom, f, indent=2)
      print(f"SBOM generated: {len(sbom['components'])} components")
      PYEOF

    - cat release-notes.md
  artifacts:
    paths:
      - release-notes.md
      - sbom.json
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

create_release:
  stage: release
  timeout: 5m
  needs:
    - job: generate_release_notes
  script:
    - echo "Release artifacts for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Radix $CI_COMMIT_TAG"
    description: "./release-notes.md"
    assets:
      links:
        - name: "SBOM (CycloneDX)"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/sbom.json"
          filepath: "/sbom.json"
          link_type: "other"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# =============================================================================
# STAGE: notify — Pipeline Status
# =============================================================================

pipeline_success:
  stage: notify
  timeout: 5m
  needs:
    - job: test_unit
      optional: true
    - job: test_property
      optional: true
    - job: test_comprehensive
      optional: true
    - job: verify_proofs
      optional: true
  script:
    - echo "=== Pipeline SUCCESS ==="
    - 'echo "Type:   $PIPELINE_TYPE"'
    - 'echo "Branch: $CI_COMMIT_BRANCH"'
    - 'echo "Commit: $CI_COMMIT_SHORT_SHA"'
    - 'echo "Author: $CI_COMMIT_AUTHOR"'
    - 'echo "Runner: $CI_RUNNER_DESCRIPTION"'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - if: $CI_COMMIT_TAG
      when: on_success

pipeline_failure:
  stage: notify
  timeout: 5m
  needs:
    - job: test_unit
      optional: true
    - job: test_property
      optional: true
    - job: test_comprehensive
      optional: true
    - job: verify_proofs
      optional: true
  script:
    - echo "=== Pipeline FAILED ==="
    - 'echo "Type:     $PIPELINE_TYPE"'
    - 'echo "Branch:   $CI_COMMIT_BRANCH"'
    - 'echo "Commit:   $CI_COMMIT_SHORT_SHA"'
    - 'echo "Author:   $CI_COMMIT_AUTHOR"'
    - 'echo "URL:      $CI_PIPELINE_URL"'
    - 'echo "Runner:   $CI_RUNNER_DESCRIPTION"'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_failure
    - if: $CI_COMMIT_TAG
      when: on_failure

# =============================================================================
# STAGE: .post — Cleanup & Telemetry
# =============================================================================

cleanup_workspace:
  stage: .post
  timeout: 5m
  script:
    - echo "=== Pipeline Telemetry ==="
    - 'echo "Pipeline ID:   $CI_PIPELINE_ID"'
    - 'echo "Pipeline URL:  $CI_PIPELINE_URL"'
    - 'echo "Runner:        $CI_RUNNER_DESCRIPTION ($CI_RUNNER_ID)"'
    - 'echo "Type:          $PIPELINE_TYPE"'
    # Cleanup temp files but preserve caches
    - find . -name '*.tmp' -delete 2>/dev/null || true
    - find . -name '*.bak' -delete 2>/dev/null || true
  rules:
    - when: always
